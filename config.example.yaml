corpus:
  chunks_path: data/chunks.parquet

ontology:
  foodon_path: data/foodon.owl
  cache_path: data/foodon_cache.parquet
  include_imports: false           # import_depth=0 in pronto
  # FoodOn .owl files embed NCBITaxon/CHEBI/BFO/ENVO terms inline. Default
  # filter keeps only FOODON: ids so the linker doesn't match food queries
  # against unrelated ontologies. Add prefixes (e.g. ["FOODON:", "CHEBI:"])
  # to broaden, or set to null to disable filtering entirely.
  prefix_filter: ["FOODON:"]

annotate:
  ner_model: sci_food_ner_v1
  scientific_embedder: allenai/specter2_base
  general_embedder: BAAI/bge-large-en-v1.5
  linker:
    lexical_threshold: 0.85
    dense_threshold: 0.78
    semantic_type_gate: true
    # All four linker tiers are enabled here for highest linking quality.
    # Dense tier — SapBERT embedding kNN. Catches lexically-distinct synonyms
    # (e.g. "ascorbate" -> vitamin C). Empty string disables it.
    dense_model: cambridgeltl/SapBERT-from-PubMedBERT-fulltext
    dense_cache_path: data/sapbert_terms.npz
    # LLM-select tier (4th tier — deviation from BRIEF §2, see BRIEF §3.5).
    # When no deterministic tier is confident, the LLM (see the `llm:` section
    # below) picks from the top-k candidates or rejects. Uses the configured
    # provider chain. Fires only below llm_select_threshold, so deterministic
    # tiers still handle the bulk of mentions.
    llm_select: true
    llm_select_threshold: 0.90
    llm_candidate_k: 8

layer_a:
  min_support: 20
  max_depth: 5
  collapse_single_child_chains: true
  blacklist_terms:
    - material entity
    - physical object
    - manufactured product
  facets: [foods, health, sustainability, dietary_patterns, allergies, nutrients]

layer_b:
  min_chunks_per_shelf: 50
  algorithm: leiden
  resolution: 1.0
  recurse_threshold: 200

layer_c:
  llm_model: claude-sonnet-4-6
  prompt_version: v1
  sample_size: 12
  grounding_check: strict
  safety_sensitive_facets: [allergies]

storage:
  chunk_store:
    backend: elastic
    url: http://localhost:9200
    index: foodscholar_chunks
  graph_store:
    backend: neo4j
    url: bolt://localhost:7687
    user: neo4j
    password: ${NEO4J_PASSWORD}

# LLM client — used by the linker's llm_select tier and Layer C card
# generation. Provider-agnostic: anthropic | openai | groq | gemini | ollama.
# API keys come from the environment (GROQ_API_KEY, ANTHROPIC_API_KEY,
# OPENAI_API_KEY, GEMINI_API_KEY), never from this file. Ollama needs no key,
# just a local daemon. The primary is tried first; fallbacks are tried in
# order if it errors (timeout, rate limit, auth, service down).
llm:
  primary:
    provider: groq
    model: llama-3.3-70b-versatile
  fallbacks:
    - provider: ollama
      model: llama3.1
      host: http://localhost:11434
  timeout_s: 30
  max_retries: 2
